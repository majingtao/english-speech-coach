<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AI智能客服 - 装修顾问Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; background: #f0f2f5; height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { background: linear-gradient(135deg, #1565c0, #0d47a1); color: #fff; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
    .header .avatar { width: 40px; height: 40px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.4em; }
    .header .info { flex: 1; }
    .header .title { font-size: 1.1em; font-weight: 600; }
    .header .subtitle { font-size: 0.75em; opacity: 0.8; }
    .header .settings-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85em; }
    .header .settings-btn:hover { background: rgba(255,255,255,0.3); }

    /* Settings panel */
    .settings-panel { display: none; background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 16px; font-size: 0.85em; }
    .settings-panel.open { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .settings-panel label { color: #555; }
    .settings-panel select { padding: 4px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9em; }

    /* Chat area */
    .chat-area { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

    /* Message bubbles */
    .msg { display: flex; gap: 8px; max-width: 85%; animation: fadeIn 0.3s ease; }
    .msg.cs { align-self: flex-start; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg .bubble-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1.1em; }
    .msg.cs .bubble-avatar { background: #e3f2fd; }
    .msg.user .bubble-avatar { background: #e8f5e9; }
    .msg .bubble { padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 0.95em; word-break: break-word; position: relative; }
    .msg.cs .bubble { background: #fff; border: 1px solid #e8e8e8; border-top-left-radius: 4px; }
    .msg.user .bubble { background: #1565c0; color: #fff; border-top-right-radius: 4px; }
    .msg .bubble .speak-icon { position: absolute; right: 6px; bottom: 4px; font-size: 0.8em; cursor: pointer; opacity: 0.4; }
    .msg .bubble .speak-icon:hover { opacity: 1; }
    .msg.user .bubble .speak-icon { left: 6px; right: auto; }
    .msg .time { font-size: 0.7em; color: #999; margin-top: 4px; }
    .msg.cs .time { text-align: left; }
    .msg.user .time { text-align: right; }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; padding: 8px 14px; }
    .typing-indicator span { width: 8px; height: 8px; background: #bbb; border-radius: 50%; animation: typing 1.2s infinite; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Input area */
    .input-area { background: #fff; border-top: 1px solid #e0e0e0; padding: 12px 16px; display: flex; gap: 8px; align-items: flex-end; }
    .input-area textarea { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 0.95em; resize: none; max-height: 100px; font-family: inherit; line-height: 1.5; }
    .input-area textarea:focus { outline: none; border-color: #1565c0; }
    .input-area button { border: none; border-radius: 8px; padding: 10px 16px; cursor: pointer; font-size: 0.95em; white-space: nowrap; }
    .input-area .mic-btn { background: #ff5722; color: #fff; }
    .input-area .mic-btn.recording { background: #b71c1c; }
    .input-area .send-btn { background: #1565c0; color: #fff; }
    .input-area .send-btn:disabled { background: #bbb; cursor: default; }

    /* Wave bars for mic */
    .wave-bars { display: inline-flex; align-items: center; gap: 2px; height: 14px; margin-left: 4px; vertical-align: middle; }
    .wave-bars span { display: inline-block; width: 3px; background: #fff; border-radius: 2px; animation: waveBar 1s ease-in-out infinite; }
    .wave-bars span:nth-child(1) { animation-delay: 0s; }
    .wave-bars span:nth-child(2) { animation-delay: 0.15s; }
    .wave-bars span:nth-child(3) { animation-delay: 0.3s; }
    .wave-bars span:nth-child(4) { animation-delay: 0.45s; }
    @keyframes waveBar { 0%, 100% { height: 4px; } 50% { height: 14px; } }

    /* Quick replies */
    .quick-replies { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 16px; background: #fafafa; border-top: 1px solid #f0f0f0; }
    .quick-btn { padding: 6px 12px; border: 1px solid #ddd; border-radius: 16px; background: #fff; font-size: 0.82em; cursor: pointer; color: #1565c0; }
    .quick-btn:hover { background: #e3f2fd; border-color: #1565c0; }

    /* Status bar */
    .status-bar { font-size: 0.75em; color: #999; text-align: center; padding: 4px; }
  </style>
</head>
<body>

<div class="header">
  <div class="avatar">🏠</div>
  <div class="info">
    <div class="title">XX装饰 · AI智能客服</div>
    <div class="subtitle">在线 | 平均响应 &lt;3秒</div>
  </div>
  <button class="settings-btn" onclick="toggleSettings()">⚙ 设置</button>
</div>

<div class="settings-panel" id="settingsPanel">
  <label>LLM: <select id="llmSelect"><option>Loading...</option></select></label>
  <label>语音: <select id="voiceSelect"><option value="zh-CN-XiaoxiaoNeural">晓晓</option></select></label>
  <label>风格: <select id="styleSelect">
    <option value="warm">热情亲切型</option>
    <option value="pro">专业顾问型</option>
    <option value="soft">温柔耐心型</option>
  </select></label>
  <label><input type="checkbox" id="ttsToggle" checked> 语音播报</label>
  <label><input type="checkbox" id="autoGreet" checked> 自动问候</label>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="quick-replies" id="quickReplies">
  <span class="quick-btn" onclick="sendQuick('我想了解装修价格')">💰 装修报价</span>
  <span class="quick-btn" onclick="sendQuick('有什么装修风格推荐？')">🎨 风格推荐</span>
  <span class="quick-btn" onclick="sendQuick('工期大概多久？')">📅 工期说明</span>
  <span class="quick-btn" onclick="sendQuick('你们用什么材料？')">🧱 材料品牌</span>
  <span class="quick-btn" onclick="sendQuick('现在有什么优惠活动吗？')">🎁 优惠活动</span>
  <span class="quick-btn" onclick="sendQuick('售后保障怎么样？')">🛡️ 售后保障</span>
</div>

<div class="status-bar" id="statusBar"></div>

<div class="input-area">
  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <textarea id="userInput" rows="1" placeholder="请输入您的问题..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMsg()">发送</button>
</div>

<script>
const _base = location.origin;
const chatArea = document.getElementById("chatArea");
const userInput = document.getElementById("userInput");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
const statusBar = document.getElementById("statusBar");
const llmSelect = document.getElementById("llmSelect");
const voiceSelect = document.getElementById("voiceSelect");
const styleSelect = document.getElementById("styleSelect");
const ttsToggle = document.getElementById("ttsToggle");
const autoGreet = document.getElementById("autoGreet");

let scripts = null;
let chatHistory = [];
let isGenerating = false;

// ---- TTS (AudioContext) ----
let _ttsAudioCtx = null, _ttsSourceNode = null;
function _getTtsAudioCtx() {
  if (!_ttsAudioCtx || _ttsAudioCtx.state === "closed") _ttsAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ttsAudioCtx.state === "suspended") _ttsAudioCtx.resume();
  return _ttsAudioCtx;
}
function stopTts() { if (_ttsSourceNode) { try { _ttsSourceNode.stop(); } catch(e) {} _ttsSourceNode = null; } }

async function speak(text) {
  if (!ttsToggle.checked) return;
  stopTts();
  const voice = voiceSelect.value || "zh-CN-XiaoxiaoNeural";
  try {
    const res = await fetch(_base + "/tts", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ engine: "edge", text, voice, rate: "-5%" })
    });
    if (!res.ok) return;
    const buf = await res.arrayBuffer();
    if (buf.byteLength < 256) return;
    const ctx = _getTtsAudioCtx();
    const audioBuf = await ctx.decodeAudioData(buf.slice(0));
    _ttsSourceNode = ctx.createBufferSource();
    _ttsSourceNode.buffer = audioBuf;
    _ttsSourceNode.connect(ctx.destination);
    _ttsSourceNode.start();
  } catch(e) { console.error("TTS:", e); }
}

// ---- ASR (mic recording) ----
let micRecording = false, micStream = null, micAudioCtx = null, micSource = null, micProcessor = null, micChunks = [];

function downsample(buf, fromRate) {
  const ratio = fromRate / 16000;
  const out = new Float32Array(Math.round(buf.length / ratio));
  for (let i = 0; i < out.length; i++) out[i] = buf[Math.round(i * ratio)];
  return out;
}

async function toggleMic() {
  if (micRecording) {
    // Stop
    micRecording = false;
    micBtn.innerHTML = "🎤";
    micBtn.classList.remove("recording");
    if (micProcessor) { micProcessor.disconnect(); micProcessor = null; }
    if (micSource) { micSource.disconnect(); micSource = null; }
    if (micChunks.length === 0) { statusBar.textContent = "未录到声音"; return; }
    statusBar.textContent = "识别中...";
    const totalLen = micChunks.reduce((s, c) => s + c.length, 0);
    const all = new Float32Array(totalLen);
    let off = 0;
    for (const c of micChunks) { all.set(c, off); off += c.length; }
    micChunks = [];
    try {
      const res = await fetch(_base + "/asr?model=sensevoice-small", {
        method: "POST", headers: {"Content-Type": "application/octet-stream"}, body: all.buffer
      });
      const data = await res.json();
      const text = (data.text || "").trim();
      if (text) { userInput.value = text; statusBar.textContent = "识别完成，可编辑后发送"; userInput.focus(); }
      else { statusBar.textContent = "未识别到语音"; }
    } catch(e) { statusBar.textContent = "识别失败: " + e.message; }
  } else {
    // Start
    try {
      if (!micStream) micStream = await navigator.mediaDevices.getUserMedia({ audio: { channelCount: 1 } });
      if (!micAudioCtx || micAudioCtx.state === "closed") micAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (micAudioCtx.state === "suspended") await micAudioCtx.resume();
      micSource = micAudioCtx.createMediaStreamSource(micStream);
      micProcessor = micAudioCtx.createScriptProcessor(4096, 1, 1);
      micChunks = [];
      micProcessor.onaudioprocess = (e) => { micChunks.push(downsample(e.inputBuffer.getChannelData(0), micAudioCtx.sampleRate)); };
      micSource.connect(micProcessor);
      micProcessor.connect(micAudioCtx.destination);
      micRecording = true;
      micBtn.innerHTML = '⏹ <span class="wave-bars"><span></span><span></span><span></span><span></span></span>';
      micBtn.classList.add("recording");
      statusBar.textContent = "录音中...点击停止";
    } catch(e) { statusBar.textContent = "麦克风权限被拒绝"; }
  }
}

// ---- Settings ----
function toggleSettings() { document.getElementById("settingsPanel").classList.toggle("open"); }

// ---- Load LLM models ----
async function loadModels() {
  try {
    const res = await fetch(_base + "/llm/models");
    const models = await res.json();
    llmSelect.innerHTML = "";
    for (const m of models) {
      const opt = document.createElement("option");
      opt.value = JSON.stringify({ provider: m.provider, model: m.model, use_proxy: m.use_proxy });
      opt.textContent = m.label;
      llmSelect.appendChild(opt);
    }
  } catch(e) { llmSelect.innerHTML = "<option>加载失败</option>"; }
}

// ---- Load voices ----
async function loadVoices() {
  try {
    const res = await fetch(_base + "/tts/voices?lang=zh");
    const voices = await res.json();
    voiceSelect.innerHTML = "";
    for (const v of voices) {
      const opt = document.createElement("option");
      opt.value = v.name;
      opt.textContent = v.name.replace("zh-CN-", "").replace("Neural", "") + " (" + v.gender + ")";
      voiceSelect.appendChild(opt);
    }
    if (voiceSelect.querySelector('[value="zh-CN-XiaoxiaoNeural"]')) voiceSelect.value = "zh-CN-XiaoxiaoNeural";
  } catch(e) {}
}

// ---- Load scripts ----
async function loadScripts() {
  try {
    const res = await fetch(_base + "/renovation-scripts.json");
    scripts = await res.json();
  } catch(e) { console.error("Failed to load scripts:", e); }
}

// ---- Build system prompt ----
function buildSystemPrompt() {
  const style = styleSelect.value;
  const styleName = style === "warm" ? "热情亲切" : style === "pro" ? "专业严谨" : "温柔耐心";

  let scriptText = "";
  if (scripts && scripts.categories) {
    for (const [cat, items] of Object.entries(scripts.categories)) {
      scriptText += `\n【${cat}】\n`;
      for (const item of items) scriptText += `- ${item}\n`;
    }
  }

  return `你是${scripts?.company || "XX装饰"}的AI智能客服，风格${styleName}。

你的目标：
1. 热情接待客户咨询，了解需求
2. 根据客户问题，参考话术库给出专业回答
3. 适时引导客户到店参观或预约设计师
4. 回答要简洁有温度，每次回复控制在2-4句话
5. 使用中文回答

以下是话术参考（灵活运用，不要生硬照搬）：
${scriptText}

注意事项：
- 不要编造具体数字（如精确价格），可以给范围
- 客户如果问竞品对比，不要贬低对手，突出自身优势
- 如果客户表达不满，先道歉安抚再解决问题
- 适当使用emoji让对话更亲切，但不要过多`;
}

// ---- Chat ----
function addMsg(role, text) {
  const div = document.createElement("div");
  div.className = "msg " + (role === "cs" ? "cs" : "user");
  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");
  div.innerHTML = `
    <div class="bubble-avatar">${role === "cs" ? "🏠" : "👤"}</div>
    <div>
      <div class="bubble">${text.replace(/\n/g, "<br>")}${role === "cs" ? '<span class="speak-icon" onclick="speak(this.parentElement.textContent.trim())">🔊</span>' : ''}</div>
      <div class="time">${timeStr}</div>
    </div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function addTyping() {
  const div = document.createElement("div");
  div.className = "msg cs";
  div.id = "typingMsg";
  div.innerHTML = `<div class="bubble-avatar">🏠</div><div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div></div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function removeTyping() {
  const el = document.getElementById("typingMsg");
  if (el) el.remove();
}

async function sendMsg() {
  const text = userInput.value.trim();
  if (!text || isGenerating) return;
  userInput.value = "";
  addMsg("user", text);

  chatHistory.push({ role: "user", content: text });

  isGenerating = true;
  sendBtn.disabled = true;
  addTyping();

  const llm = JSON.parse(llmSelect.value);
  const messages = [
    { role: "system", content: buildSystemPrompt() },
    ...chatHistory.slice(-20) // keep last 20 messages for context
  ];

  let fullText = "";
  try {
    const res = await fetch(_base + "/llm/chat", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ provider: llm.provider, model: llm.model, use_proxy: llm.use_proxy, messages })
    });

    removeTyping();
    const msgDiv = addMsg("cs", "");
    const bubbleEl = msgDiv.querySelector(".bubble");

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split("\n");
      buffer = lines.pop() || "";
      for (const line of lines) {
        if (!line.trim()) continue;
        try {
          const obj = JSON.parse(line);
          if (obj.content) {
            fullText += obj.content;
            bubbleEl.innerHTML = fullText.replace(/\n/g, "<br>") + '<span class="speak-icon" onclick="speak(this.parentElement.textContent.trim())">🔊</span>';
            chatArea.scrollTop = chatArea.scrollHeight;
          }
        } catch(e) {}
      }
    }

    chatHistory.push({ role: "assistant", content: fullText });
    if (ttsToggle.checked && fullText) speak(fullText);
  } catch(e) {
    removeTyping();
    addMsg("cs", "抱歉，网络出了点问题，请稍后再试。");
  }

  isGenerating = false;
  sendBtn.disabled = false;
  statusBar.textContent = "";
}

function sendQuick(text) {
  userInput.value = text;
  sendMsg();
}

// ---- Auto-resize textarea ----
userInput.addEventListener("input", () => {
  userInput.style.height = "auto";
  userInput.style.height = Math.min(userInput.scrollHeight, 100) + "px";
});

// ---- Init ----
async function init() {
  await Promise.all([loadModels(), loadVoices(), loadScripts()]);
  if (autoGreet.checked) {
    setTimeout(() => {
      const greetings = scripts?.categories?.["开场问候"] || ["您好，欢迎咨询！请问有什么可以帮您的？"];
      const greeting = greetings[Math.floor(Math.random() * greetings.length)];
      addMsg("cs", greeting);
      chatHistory.push({ role: "assistant", content: greeting });
      if (ttsToggle.checked) speak(greeting);
    }, 800);
  }
}
init();
</script>
</body>
</html>
